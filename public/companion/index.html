<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blobbi Companion</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="blobbi-companion" class="blobbi-container">
        <div class="blobbi-character" id="blobbi-character">
            <!-- SVG will be loaded here dynamically -->
        </div>
        <div class="blobbi-controls">
            <button id="toggle-visibility" class="control-btn" title="Show/Hide Flammi">👁️</button>
            <button id="toggle-movement" class="control-btn" title="Manual movement mode">🚶</button>
            <button id="toggle-free-roam" class="control-btn" style="display: none;" title="Toggle free roam">🎲</button>
            <button id="feed-flammi" class="control-btn" title="Feed Flammi charcoal">🪨</button>
            <button id="show-speech-bubble" class="control-btn" title="Make Flammi speak">💬</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
